<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>OCEAN</title>
    </head>
        <script>
            window.addEventListener("load", function() {
                var mar = document.getElementById("MAR");
                var ctx = mar.getContext("2d");

                var pez = new Image();
                var dibujo = localStorage.getItem("mipez");

                var x = 50;
                var y = 180;
                var velocidad = 2;

                function animar(){
                    ctx.clearRect(0, 0, mar.width, mar.height);
                    ctx.fillStyle = "#001a33";
                    ctx.fillRect(0, 0, mar.width, mar.height);

                    x += velocidad;
                    if (x > mar.width){
                        x = -100;
                    }

                    ctx.drawImage(pez, x, y, 100, 70);
                    requestAnimationFrame(animar);
                }

                if (dibujo){
                    pez.src = dibujo;
                    pez.onload = animar;
                } else {
                    ctx.fillStyle = "#001a33";
                    ctx.fillRect(0, 0, mar.width, mar.height);
                    ctx.fillStyle = "white";
                    ctx.font = "20px sans-serif";
                    ctx.fillText("No hay dibujo guardado. Vuelve a dibujar.", 20, 220);
                }
            });
        </script>
        <body style="background: #001122; color: white;">
            
            <H1> EL OCEANO BRRR</H1>
            
            <canvas id="MAR" width="700" height="400"
            style="border: 2px solid #003366; display: block;">
            </canvas>
            
            <br>
            <a href="index.html" style="color: lightblue;">VOLVER A DIBUJAR</a>

        </body>

</html>
