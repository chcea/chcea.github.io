<!DOCTYPE html>
<html>

    <head>
        <title>FISH</title>
    </head>

    <body>
        <h1> DIBUJA TU PEZ</h1>
        <P>usa el mouse para dibujar</P>

        <canvas id='lienzo' width="500" height="300" style="border:  2px solid blue; background: #001122; cursor: crosshair;"></canvas>
        
        <br>

        <button onclick="borrar()">BORRAR</button>
        <a href="oceano.html">IR AL OCÉANO</a>

    <script>
        var lienzo = document.getElementById("lienzo");
        var pincel = lienzo.getContext("2d");
        var dibujando = false

        lienzo.addEventListener("mousedown", function(e){
            dibujando = true;
            pincel.beginPath();
            pincel.moveTo(e.offsetX, e.offsetY);
        });

        lienzo.addEventListener("mousemove", function(e){
            if (dibujando){
                pincel.lineTo(e.offsetX, e.offsetY);
                pincel.strokeStyle = "#00ccff";
                pincel.lineWidth = 5;
                pincel.stroke();
            }
        });

        lienzo.addEventListener("mouseup", function(){
            dibujando = false;
        });

        function borrar(){
            pincel.clearRect(0, 0, lienzo.width, lienzo.height);
        }

        document.querySelector("a").addEventListener("click", function(){
            var imagen = lienzo.toDataURL();
            localStorage.setItem("mipez", imagen);
        });

    </script>
    </body>

</html>
