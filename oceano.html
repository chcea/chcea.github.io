<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>OCEAN</title>
        <audio autoplay loop>
            <source src="SpongeBob.mp3" type="audio/mpeg">
        </audio>
        <style>

            body {
                background: #000d1a;
                color: white;
                font-family: Arial, sans-serif;
                display: flex;
                flex-direction: column;
                align-items: center;
                padding: 30px;
            }

            h1 {
                font-size: 36px;
                color: #00ccff;
                margin-bottom: 16px;
            }

            #mar {
                border: 2px solid #003366;
                border-radius: 10px;
            }

            a {
                color: #00ccff;
                font-size: 16px;
                text-decoration: none;
                margin-top: 20px;
                border: 1px solid #00ccff;
                padding: 10px 20px;
                border-radius: 8px;
            }

            a:hover {
                background: #00ccff;
                color: #001122;
            }

        </style>
    </head>
        <script>
            window.addEventListener("load", function() {
                var mar = document.getElementById("MAR");
                var ctx = mar.getContext("2d");

                var pez = new Image();
                var dibujo = localStorage.getItem("mipez");

                var x = 50;
                var y = 330;
                var velocidad = 2;

                function animar(){
                    ctx.clearRect(0, 0, mar.width, mar.height);
                    ctx.fillStyle = "#001a33";
                    ctx.fillRect(0, 0, mar.width, mar.height);

                    x += velocidad;
                    if (x > mar.width){
                        x = -100;
                    }

                    ctx.drawImage(pez, x, y, 200, 140);
                    requestAnimationFrame(animar);
                }

                if (dibujo){
                    pez.src = dibujo;
                    pez.onload = animar;
                } else {
                    ctx.fillStyle = "#001a33";
                    ctx.fillRect(0, 0, mar.width, mar.height);
                    ctx.fillStyle = "white";
                    ctx.font = "20px sans-serif";
                    ctx.fillText("No hay dibujo guardado. Vuelve a dibujar.", 20, 220);
                }
            });
        </script>
        <body style="background: #001122; color: white;">
            
            <H1> EL OCEANO glu glu glu glu 🫧</H1>


            <canvas id="MAR" width="1000" height="600"
            style="border: 2px solid #003366; display: block;">
            </canvas>
            
            <br>
            <a href="index.html" style="color: lightblue;">VOLVER A DIBUJAR</a>

        </body>


</html>
